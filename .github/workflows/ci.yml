name: CI
on:
  pull_request:
  push:
    branches: [main]

# Annule les exécutions superflues sur une même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Build, typecheck & E2E (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env
        run: cp .env.example .env

      # api dépend de migrate (service_completed_successfully) : au retour de
      # cette commande, migrations + seed sont terminés et l'API tourne.
      - name: Build & start stack
        run: docker compose up --build -d api console-web

      - name: Typecheck workspace (in container)
        run: docker compose run --rm --no-deps api sh -c "cd /repo && pnpm -r typecheck"

      - name: E2E API — suite complète (in container)
        run: docker compose --profile test run --rm e2e

      - name: E2E web — Playwright (in container)
        run: docker compose --profile test run --rm playwright

      - name: Logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Teardown
        if: always()
        run: docker compose down -v

  # ⏳ À venir : E2E mobile (Maestro) quand les apps RN existeront — cf. transpo-testing.
