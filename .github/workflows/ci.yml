name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    name: Build & smoke (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env
        run: cp .env.example .env

      - name: Build & start stack
        run: docker compose up --build -d

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf localhost:3000/health; then echo "API up"; exit 0; fi
            sleep 3
          done
          echo "API n'a pas démarré"; docker compose logs --no-color; exit 1

      - name: Tenant isolation smoke
        run: |
          set -e
          echo "CasaExpress :"; curl -sf -H "x-tenant-slug: casaexpress" localhost:3000/v1/orders
          echo; echo "Atlas :";    curl -sf -H "x-tenant-slug: atlas"       localhost:3000/v1/orders
          echo; echo "Inconnu (doit échouer) :"; curl -s -o /dev/null -w "%{http_code}\n" -H "x-tenant-slug: nope" localhost:3000/v1/orders | grep -q 400

      - name: Teardown
        if: always()
        run: docker compose down -v

  # ⏳ À venir : jobs unit + intégration + E2E (Playwright/Maestro) — voir skill transpo-testing.
