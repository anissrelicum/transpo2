# Transpo — orchestration dev. TOUT tourne en conteneur (voir skill transpo-architecture).
# Démarrage : cp .env.example .env && docker compose up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transpo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transpo_dev}
      POSTGRES_DB: ${POSTGRES_DB:-transpo}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transpo} -d ${POSTGRES_DB:-transpo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-transpo}:${POSTGRES_PASSWORD:-transpo_dev}@postgres:5432/${POSTGRES_DB:-transpo}
      API_PORT: ${API_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
