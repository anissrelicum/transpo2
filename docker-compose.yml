# Transpo — orchestration dev. TOUT tourne en conteneur (voir skill transpo-architecture).
# Démarrage : cp .env.example .env && docker compose up --build
# Ordre : postgres (healthy) -> migrate (migrations + seed, one-shot) -> api
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transpo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transpo_dev}
      POSTGRES_DB: ${POSTGRES_DB:-transpo}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transpo} -d ${POSTGRES_DB:-transpo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Job one-shot : applique les migrations (platform + tenants) puis le seed de dev.
  # Les migrations sont désormais propriétaires du schéma (plus d'init.sql).
  migrate:
    image: transpo/app:dev
    working_dir: /repo/packages/db
    command: sh -c "pnpm migrate && pnpm seed"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-transpo}:${POSTGRES_PASSWORD:-transpo_dev}@postgres:5432/${POSTGRES_DB:-transpo}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: transpo/app:dev
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-transpo}:${POSTGRES_PASSWORD:-transpo_dev}@postgres:5432/${POSTGRES_DB:-transpo}
      API_PORT: ${API_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Console transport (Next.js) — BFF vers l'API (pas de CORS).
  console-web:
    build:
      context: .
      dockerfile: apps/console-web/Dockerfile
    image: transpo/console-web:dev
    environment:
      API_URL: http://api:3000
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_started

  # Tests E2E API (profil "test").
  e2e:
    image: transpo/app:dev
    working_dir: /repo/apps/e2e
    command: pnpm test
    environment:
      API_URL: http://api:3000
    profiles: ["test"]
    depends_on:
      api:
        condition: service_started

  # Tests E2E web (Playwright) — image officielle avec navigateurs préinstallés.
  playwright:
    image: mcr.microsoft.com/playwright:v1.48.0-jammy
    working_dir: /work
    volumes:
      - ./apps/e2e-web:/work
    environment:
      WEB_URL: http://console-web:3001
    command: sh -c "npm i -D @playwright/test@1.48.0 --no-save --silent && npx playwright test"
    profiles: ["test"]
    depends_on:
      console-web:
        condition: service_started

volumes:
  pgdata:

